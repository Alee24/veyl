version: '3.8'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgresql://veyl:veylpassword@postgres:5432/veyldb?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=veyl_super_secret_dev_key
      - JWT_REFRESH_SECRET=veyl_super_secret_refresh_dev_key
      - FIREBASE_SERVICE_ACCOUNT_PATH=${FIREBASE_SERVICE_ACCOUNT_PATH}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/src:/usr/src/app/src
      - ./backend/public:/usr/src/app/public
      - ./backend/.env:/usr/src/app/.env

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=veyl
      - POSTGRES_PASSWORD=veylpassword
      - POSTGRES_DB=veyldb
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
