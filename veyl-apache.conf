<VirtualHost *:80>
    ServerName veyl.kkdes.co.ke

    ProxyPreserveHost On
    ProxyRequests Off

    # 1. Reverse Proxy WebSocket (Socket.IO) traffic
    RewriteEngine On
    RewriteCond %{HTTP:Connection} Upgrade [NC]
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteRule /socket.io/(.*) ws://localhost:3000/socket.io/$1 [P,L]

    ProxyPass /socket.io/ ws://localhost:3000/socket.io/
    ProxyPassReverse /socket.io/ ws://localhost:3000/socket.io/

    # 2. Reverse Proxy General HTTP traffic (API & Static Web Client)
    ProxyPass / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/veyl_error.log
    CustomLog ${APACHE_LOG_DIR}/veyl_access.log combined
</VirtualHost>
